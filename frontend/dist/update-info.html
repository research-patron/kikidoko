<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>キキドコ | アップデート情報</title>
    <meta
      name="description"
      content="キキドコの最新アップデートと過去の更新履歴を確認できます。"
    />
    <link rel="icon" type="image/png" href="/brand/app-icon-square.png" />
    <link rel="apple-touch-icon" href="/brand/app-icon-square.png" />
    <link rel="stylesheet" href="/update-info.css?v=20260328-update-info-font-sheet-fix-1" />
    <script defer src="/update-info.js?v=20260328-update-info-font-sheet-fix-1"></script>
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <a href="/" class="back-link">← トップへ戻る</a>
        <h1>アップデート情報</h1>
        <p>キキドコの最新更新と過去の更新履歴を時系列で掲載しています。</p>
      </header>

      <main class="update-layout">
        <nav id="update-month-nav" class="update-month-nav" aria-label="月別ナビゲーション"></nav>

        <section class="update-section">
          <div class="section-heading">
            <h2>最新の更新</h2>
          </div>
          <div id="update-latest" class="update-latest" aria-live="polite">
            <p class="empty">読み込み中です...</p>
          </div>
        </section>

        <section class="update-section">
          <div class="section-heading">
            <h2>過去の更新</h2>
          </div>
          <div id="update-archive" class="update-archive" aria-live="polite">
            <p class="empty">読み込み中です...</p>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
